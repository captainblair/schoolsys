{% extends 'HOME/base.html' %}
{% block body %}
<div class="page-wrapper">
   <div class="content container-fluid">
      <div class="page-header">
         <div class="row align-items-center">
            <div class="col">
               <h3 class="page-title">Add Department</h3>
               <ul class="breadcrumb">
                  <li class="breadcrumb-item"><a href="{% url 'department_list' %}">Departments</a></li>
                  <li class="breadcrumb-item active">Add Department</li>
               </ul>
            </div>
         </div>
      </div>
      <div class="card">
         <div class="card-body">
            <form method="POST">
               {% csrf_token %}
               <div class="row">
                  <div class="col-12 col-sm-6"><div class="form-group"><label>Department ID</label><input type="text" class="form-control" name="department_id" required></div></div>
                  <div class="col-12 col-sm-6"><div class="form-group"><label>Department Name</label><input type="text" class="form-control" name="name" required></div></div>
                  <div class="col-12 col-sm-6"><div class="form-group"><label>Head of Department</label><input type="text" class="form-control" name="head_of_department" required></div></div>
                  <div class="col-12 col-sm-6"><div class="form-group"><label>Department Start Date</label><input type="date" class="form-control" name="start_date" required></div></div>
                  <div class="col-12 col-sm-6"><div class="form-group"><label>No of Students</label><input type="number" class="form-control" name="number_of_students" min="0" value="0" required></div></div>
                  <div class="col-12"><button type="submit" class="btn btn-primary">Submit</button></div>
               </div>
            </form>
         </div>
      </div>
   </div>
</div>
{% endblock %}
