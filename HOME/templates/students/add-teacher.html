{% extends 'HOME/base.html' %}
{% load static %}
{% block body %}
<div class="page-wrapper">
   <div class="content container-fluid">
      <div class="page-header">
         <div class="row align-items-center">
            <div class="col">
               <h3 class="page-title">Add Teacher</h3>
               <ul class="breadcrumb">
                  <li class="breadcrumb-item"><a href="{% url 'teacher_list' %}">Teachers</a></li>
                  <li class="breadcrumb-item active">Add Teacher</li>
               </ul>
            </div>
         </div>
      </div>
      <div class="row">
         <div class="col-sm-12">
            <div class="card">
               <div class="card-body">
                  <form method="POST" enctype="multipart/form-data">
                     {% csrf_token %}
                     <div class="row">
                        <div class="col-12"><h5 class="form-title"><span>Teacher Information</span></h5></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Teacher ID</label><input type="text" class="form-control" name="teacher_id" required></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Name</label><input type="text" class="form-control" name="name" required></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Gender</label><select class="form-control" name="gender" required><option value="">Select Gender</option><option value="Female">Female</option><option value="Male">Male</option><option value="Other">Other</option></select></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Date of Birth</label><input type="date" class="form-control" name="date_of_birth" required></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Mobile</label><input type="text" class="form-control" name="mobile" required></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Joining Date</label><input type="date" class="form-control" name="joining_date" required></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Qualification</label><input type="text" class="form-control" name="qualification" required></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Experience</label><input type="text" class="form-control" name="experience" required></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Username</label><input type="text" class="form-control" name="username" required></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Email ID</label><input type="email" class="form-control" name="email" required></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Class</label><input type="text" class="form-control" name="teacher_class"></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Subject</label><input type="text" class="form-control" name="subject"></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Section</label><input type="text" class="form-control" name="section"></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Teacher Image</label><input type="file" class="form-control" name="teacher_image"></div></div>
                        <div class="col-12"><h5 class="form-title"><span>Address</span></h5></div>
                        <div class="col-12"><div class="form-group"><label>Address</label><textarea class="form-control" name="address" required></textarea></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>City</label><input type="text" class="form-control" name="city" required></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>State</label><input type="text" class="form-control" name="state" required></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Zip Code</label><input type="text" class="form-control" name="zip_code" required></div></div>
                        <div class="col-12 col-sm-6"><div class="form-group"><label>Country</label><input type="text" class="form-control" name="country" required></div></div>
                        <div class="col-12"><button type="submit" class="btn btn-primary">Submit</button></div>
                     </div>
                  </form>
               </div>
            </div>
         </div>
      </div>
   </div>
</div>
{% endblock %}
