{% extends 'HOME/base.html' %}
{% block body %}
<div class="page-wrapper">
   <div class="content container-fluid">
      <div class="page-header">
         <div class="row align-items-center">
            <div class="col">
               <h3 class="page-title">Add Subject</h3>
               <ul class="breadcrumb">
                  <li class="breadcrumb-item"><a href="{% url 'subject_list' %}">Subjects</a></li>
                  <li class="breadcrumb-item active">Add Subject</li>
               </ul>
            </div>
         </div>
      </div>
      <div class="card">
         <div class="card-body">
            <form method="POST">
               {% csrf_token %}
               <div class="row">
                  <div class="col-12 col-sm-6"><div class="form-group"><label>Subject ID</label><input type="text" class="form-control" name="subject_id" required></div></div>
                  <div class="col-12 col-sm-6"><div class="form-group"><label>Subject Name</label><input type="text" class="form-control" name="name" required></div></div>
                  <div class="col-12 col-sm-6"><div class="form-group"><label>Class</label><input type="text" class="form-control" name="subject_class" required></div></div>
                  <div class="col-12"><button type="submit" class="btn btn-primary">Submit</button></div>
               </div>
            </form>
         </div>
      </div>
   </div>
</div>
{% endblock %}
