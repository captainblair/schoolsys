{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
<title>Preskool - Register</title>
<link rel="shortcut icon" href="{% static 'img/favicon.png' %}">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap">
<link rel="stylesheet" href="{% static 'plugins/bootstrap/css/bootstrap.min.css' %}">
<link rel="stylesheet" href="{% static 'plugins/fontawesome/css/fontawesome.min.css' %}">
<link rel="stylesheet" href="{% static 'plugins/fontawesome/css/all.min.css' %}">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="main-wrapper login-body">
<div class="login-wrapper">
<div class="container">
<div class="loginbox">
<div class="login-left">
<img class="img-fluid" src="{% static 'img/logo-white.png' %}" alt="Logo">
</div>
<div class="login-right">
<div class="login-right-wrap">
<h1>Register</h1>
<p class="account-subtitle">Access to our dashboard</p>
{% for message in messages %}
<div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %}">{{ message }}</div>
{% endfor %}
<form method="POST" action="{% url 'register' %}">
{% csrf_token %}
<div class="form-group">
<input class="form-control" type="text" name="first_name" placeholder="First Name" required>
</div>
<div class="form-group">
<input class="form-control" type="text" name="last_name" placeholder="Last Name" required>
</div>
<div class="form-group">
<input class="form-control" type="email" name="email" placeholder="Email" required>
</div>
<div class="form-group">
<select class="form-control" name="role" required>
<option value="student">Student</option>
<option value="teacher">Teacher</option>
</select>
</div>
<div class="form-group password-field">
<input class="form-control" id="register-password" type="password" name="password" placeholder="Password" required>
<button class="toggle-password" type="button" data-target="#register-password" aria-label="Show password"><i class="fas fa-eye"></i></button>
</div>
<div class="form-group password-field">
<input class="form-control" id="register-confirm-password" type="password" name="confirm_password" placeholder="Confirm Password" required>
<button class="toggle-password" type="button" data-target="#register-confirm-password" aria-label="Show password"><i class="fas fa-eye"></i></button>
</div>
<div class="form-group mb-0">
<button class="btn btn-primary btn-block" type="submit">Register</button>
</div>
</form>
<div class="text-center dont-have">Already have an account? <a href="{% url 'login' %}">Login</a></div>
</div>
</div>
</div>
</div>
</div>
</div>
<script src="{% static 'js/jquery-3.6.0.min.js' %}"></script>
<script src="{% static 'js/popper.min.js' %}"></script>
<script src="{% static 'plugins/bootstrap/js/bootstrap.min.js' %}"></script>
<script src="{% static 'js/script.js' %}"></script>
</body>
</html>
