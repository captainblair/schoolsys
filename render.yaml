databases:
  - name: schoolsys-db
    databaseName: schoolsys
    user: schoolsys

services:
  - type: web
    name: schoolsys
    runtime: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn HOME.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: schoolsys-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.13.5"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: CLOUDINARY_URL
        sync: false
